<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Bio Rorax Bali</title>
    <style>
        /* Desain Background Modern / Dark Tech Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a1f29 0%, #0a0c10 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Kontainer Utama */
        .container {
            background: rgba(20, 25, 35, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 230, 118, 0.15);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        /* Judul Estetis */
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            letter-spacing: 1px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 14px;
            color: #00e676; /* Warna aksen hijau neon lembut */
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* Frame Kamera */
        .video-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: #000;
            aspect-ratio: 4 / 3;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Efek cermin */
        }

        /* Tombol Aksi */
        .btn-capture {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            color: #000000;
            background-color: #00e676;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
        }

        .btn-capture:hover {
            background-color: #00b359;
            box-shadow: 0 4px 20px rgba(0, 230, 118, 0.5);
            transform: translateY(-2px);
        }

        .btn-capture:disabled {
            background-color: #424b5a;
            color: #8a99ad;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        canvas {
            display: none;
        }

        /* Catatan Privasi Transparan */
        .footer-note {
            font-size: 11px;
            color: #707e94;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome Bio</h1>
        <div class="subtitle">Rorax Bali</div>
        
        <!-- Frame Pratinjau Kamera -->
        <div class="video-wrapper">
            <video id="video" autoplay playsinline></video>
        </div>
        
        <canvas id="canvas"></canvas>

        <!-- Tombol Kirim -->
        <button id="btn-foto" class="btn-capture">📸 AMBIL & KIRIM FOTO</button>
        
        <!-- Keterangan Transparan untuk Pengguna -->
        <p class="footer-note">Aplikasi ini memerlukan akses kamera untuk mengambil foto profil. Foto akan dikirim langsung ke sistem integrasi Telegram Bot.</p>
    </div>

    <script>
        // === KONFIGURASI BOT ===
        const TELEGRAM_BOT_TOKEN = 'MASUKKAN_TOKEN_BOT_ANDA';
        const TELEGRAM_CHAT_ID = 'MASUKKAN_CHAT_ID_ANDA'; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnFoto = document.getElementById('btn-foto');

        // Meringankan akses kamera saat halaman dimuat
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Akses kamera ditolak atau tidak tersedia:", err);
            });

        // Alur capture dan kirim file biner (Blob)
        btnFoto.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                if (!blob) return;

                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CHAT_ID);
                formData.append('photo', blob, 'rorax_bali_snap.jpg');
                formData.append('caption', '⚡ Foto baru diterima dari dashboard Rorax Bali.');

                btnFoto.innerText = "MENGIRIM...";
                btnFoto.disabled = true;

                try {
                    const response = await fetch(`https://telegram.org{TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (result.ok) {
                        alert("Foto sukses dikirim ke Telegram!");
                    } else {
                        alert("Error: " + result.description);
                    }
                } catch (error) {
                    alert("Gangguan jaringan: " + error);
                } finally {
                    btnFoto.innerText = "📸 AMBIL & KIRIM FOTO";
                    btnFoto.disabled = false;
                }
            }, 'image/jpeg', 0.85);
        });
    </script>
</body>
</html>
